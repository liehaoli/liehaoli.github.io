<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    {{- $url := trim .url " " }}
    {{- $isMail := hasPrefix $url "mailto:" }}
    <a href="{{ $url | safeURL }}" {{ if not $isMail }}target="_blank" rel="noopener noreferrer me"{{ else }}rel="me"{{ end }}
        title="{{ (.title | default .name) | title }}">
        {{ partial "svg.html" . }}
    </a>
    {{- end }}
</div>
