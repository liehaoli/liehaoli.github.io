<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">LLM output parsing scenario map</title>
  <desc id="desc">A compact diagram showing how to choose an LLM output parsing strategy by scenario.</desc>
  <style>
    .bg { fill: #fbfaf7; }
    .card { fill: #fffefb; stroke: #222; stroke-width: 2.5; }
    .soft-blue { fill: #e3f2ff; }
    .soft-green { fill: #e7f6df; }
    .soft-yellow { fill: #fff0bd; }
    .soft-red { fill: #ffe5e5; }
    .title { font: 700 34px Arial, sans-serif; fill: #222; }
    .subtitle { font: 20px Arial, sans-serif; fill: #555; }
    .head { font: 700 24px Arial, sans-serif; fill: #222; text-anchor: middle; }
    .body { font: 19px Arial, sans-serif; fill: #333; text-anchor: middle; }
    .arrow { stroke: #222; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="58" y="64">Parsing is a scenario problem</text>
  <text class="subtitle" x="60" y="98">Choose the output wrapper by content shape and failure cost.</text>

  <rect class="card soft-blue" x="60" y="145" width="180" height="125" rx="12"/>
  <text class="head" x="150" y="190">Plain text</text>
  <text class="body" x="150" y="230">No structure</text>
  <text class="body" x="150" y="256">Strip wrappers</text>

  <rect class="card soft-green" x="285" y="145" width="195" height="125" rx="12"/>
  <text class="head" x="382.5" y="190">Few fields</text>
  <text class="body" x="382.5" y="230">Rare tags</text>
  <text class="body" x="382.5" y="256">Small regex</text>

  <rect class="card soft-yellow" x="525" y="145" width="210" height="125" rx="12"/>
  <text class="head" x="630" y="181">Code or</text>
  <text class="head" x="630" y="208">Markdown</text>
  <text class="body" x="630" y="239">Fenced blocks</text>
  <text class="body" x="630" y="262">XML tags</text>

  <rect class="card soft-red" x="270" y="365" width="235" height="125" rx="12"/>
  <text class="head" x="387.5" y="410">Tool calls</text>
  <text class="body" x="387.5" y="450">Schema / grammar</text>
  <text class="body" x="387.5" y="476">Critical paths</text>

  <rect class="card" x="580" y="365" width="220" height="125" rx="12"/>
  <text class="head" x="690" y="410">Always add</text>
  <text class="body" x="690" y="450">Strict parser</text>
  <text class="body" x="690" y="476">Local rescue</text>

  <path class="arrow" d="M 240 208 L 285 208"/>
  <path class="arrow" d="M 480 208 L 525 208"/>
  <path class="arrow" d="M 382 270 C 382 310 385 340 386 365"/>
  <path class="arrow" d="M 630 275 C 615 320 500 348 430 365"/>
  <path class="arrow" d="M 505 428 L 580 428"/>
</svg>
